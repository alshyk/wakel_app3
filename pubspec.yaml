name: wakel_app3

description: A new Flutter project.

publish_to: 'none'

version: 3.0.0+3

environment:
  sdk: ">=3.0.0 <4.0.0"

dependencies:
  flutter:
    sdk: flutter
  audioplayers: ^6.0.0
  http: ^0.13.6
  shared_preferences: ^2.2.2
  intl: ^0.18.1
  image_picker: ^1.0.0
  package_info_plus: ^8.0.0
  url_launcher: ^6.3.0
  dio: ^5.4.0
  path_provider: ^2.1.2
  open_file: ^3.3.2

dev_dependencies:
  flutter_test:
    sdk: flutter
  flutter_launcher_icons: ^0.13.1

flutter_icons:
  android: true
  ios: true
  image_path: "assets/icon/icon.png"
  adaptive_icon_background: "#1a1a2e"
  adaptive_icon_foreground: "assets/icon/icon.png"

flutter:
  uses-material-design: true
  assets:
    - assets/sounds/notification.mp3
    - assets/images/trc20.png
    - assets/icon/icon.png